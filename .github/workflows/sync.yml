name: Sync Media Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'

jobs:
  # STEP 1: Quality Gate (runs on your infrastructure)
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm test

  # STEP 2: Cloud Sync (runs on GitHub's infrastructure)
  sync:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Sync Container
        env:
          EMBY_URL: ${{ secrets.EMBY_URL }}
          EMBY_API_KEY: ${{ secrets.EMBY_API_KEY }}
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/emby-list-fetcher:latest
          
          # Run the container. The container writes files to ./docs/data
          docker run --rm \
            -e EMBY_URL \
            -e EMBY_API_KEY \
            -v "$(pwd)/docs/data:/app/docs/data" \
            ${{ secrets.DOCKERHUB_USERNAME }}/emby-list-fetcher:latest

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if ! git diff-index --quiet HEAD -- docs/data/; then
            git commit -m "Automated Sync: Update media catalog $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes detected to commit."
          fi
