name: Sync Media Catalog

on:
  workflow_dispatch:
  schedule:
    # 09:30 UTC = 02:30 AM Mountain Time
    - cron: '30 9 * * *'

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Run Sync Container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/emby-list-fetcher:latest
          docker run --rm \
            -v "$PWD/docs/data:/app/docs/data" \
            -e EMBY_URL="${{ secrets.EMBY_URL }}" \
            -e EMBY_API_KEY="${{ secrets.EMBY_API_KEY }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/emby-list-fetcher:latest

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add docs/
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated Sync: Update media catalog $(date +'%Y-%m-%d')"
            git push origin main --force
          else
            echo "No library changes detected."
            exit 0
          fi
