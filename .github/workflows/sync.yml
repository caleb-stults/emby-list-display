name: Sync Media Catalog

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: List files
        run: ls -la

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        run: node fetch-media.js
        env:
          EMBY_URL: ${{ secrets.EMBY_URL }}
          EMBY_API_KEY: ${{ secrets.EMBY_API_KEY }}
