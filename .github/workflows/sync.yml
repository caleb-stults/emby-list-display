name: Sync Media Catalog

on:
  workflow_dispatch:
  schedule:
    # 09:30 UTC = 02:30 AM Mountain Time
    - cron: '30 9 * * *'

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        run: node fetch-media.js
        env:
          EMBY_URL: ${{ secrets.EMBY_URL }}
          EMBY_API_KEY: ${{ secrets.EMBY_API_KEY }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add docs/
          # Only push if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated Sync: Update media catalog $(date +'%Y-%m-%d')"
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || sleep 5
            done
          else
            echo "No library changes detected."
          fi
