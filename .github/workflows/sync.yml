name: Sync Media Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          EMBY_URL: ${{ secrets.EMBY_URL }}
          EMBY_API_KEY: ${{ secrets.EMBY_API_KEY }}
          NODE_ENV: production
        run: node fetch-media.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (including new posters and media.json)
          git add docs/data/
          
          # Check if there are changes to commit
          if ! git diff-index --quiet HEAD -- docs/data/; then
            git commit -m "Automated Sync: Update media catalog $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes detected to commit."
          fi
