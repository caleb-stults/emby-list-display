<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoss' Netflix</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <header class="header-container">
        <div class="title-wrapper">
            <img src="./icon.png" alt="Library Icon" class="brand-icon" onerror="this.style.display='none';">
            <h1>Hoss' Netflix</h1>
        </div>
        <p class="welcome-blurb">
            Welcome to Hoss' Netflix! Here you can see the selections that are available on the server. Click on the poster of the movie or show to learn more about it.
        </p>

        <div class="search-container">
            <input type="text" id="library-search" class="search-input" placeholder="Search titles..." oninput="filterAndRender()">
            <select id="sort-select" class="search-input" onchange="filterAndRender()">
                <option value="title-asc" selected>Title (A-Z)</option>
                <option value="year-desc">Year (Newest)</option>
                <option value="year-asc">Year (Oldest)</option>
            </select>
            <select id="genre-select" class="search-input" onchange="filterAndRender()">
                <option value="all">All Genres</option>
            </select>
        </div>
    </header>

    <nav class="filter-nav">
        <button id="movies-tab-btn" class="filter-btn active" onclick="switchTab('movies', this)">Movies</button>
        <button id="tv-tab-btn" class="filter-btn" onclick="switchTab('tv', this)">TV Shows</button>
    </nav>

    <main class="media-grid" id="catalog-display-box"></main>

    <div id="toast-message" class="toast-notification"></div>

    <script src="./assets/js/app.js"></script>
</body>
</html>
